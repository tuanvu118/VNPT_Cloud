version: '3'

services:
  # Web App instance 1
  web1:
    build: .
    container_name: web_app_1
    env_file:
      - .env
    expose:
      - "8000"
    restart: always

  # Web App instance 2 (Dùng chung mã nguồn nhưng chạy độc lập)
  web2:
    build: .
    container_name: web_app_2
    env_file:
      - .env
    expose:
      - "8000"
    restart: always

  # Load Balancer HAProxy
  haproxy:
    image: haproxy:2.8-alpine
    container_name: load_balancer_haproxy
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "80:80"
    depends_on:
      - web1
      - web2
    restart: always
